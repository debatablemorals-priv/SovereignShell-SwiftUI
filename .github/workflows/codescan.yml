name: CodeScan

on:
  push:
    branches: [ "main" ]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  codescan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run CodeScan
        uses: codescan-io/codescan-scanner-action@v2
        with:
          login: ${{ secrets.CODESCAN_LOGIN }}
          password: ${{ secrets.CODESCAN_PASSWORD }}
